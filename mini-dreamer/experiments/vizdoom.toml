[env]
env_id = "VizdoomBasic-v1"

[dataset]
rollout_steps = 2000
seed = 0
clip_length = 8
clip_stride = 1
preview_dir = "logs/vizdoom-v0/previews"
preview_clips = 4
preview_fps = 8.0
frame_skip = 4

[model]
base_channels = 32
num_transformer_blocks = 4
use_wavelet = true
max_context_size = 3

[train]
save_dir = "logs/vizdoom-v0"
train_steps = 10000
batch_size = 8
learning_rate = 3e-4
log_every = 100
log_tensorboard = true
sampling_distribution = "logitnorm"

[generate]
load_dir = "logs/vizdoom-v0"
save_dir = "logs/vizdoom-v0/generated"
generate_new_frames = 2
generate_num_steps = 32
num_samples = 8
